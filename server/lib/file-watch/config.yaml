# Each top-level key maps directly to server/lib/file-watch/handlers/<name>.js.
# `path-index` is a normal handler that tracks the currently existing files and directories.
# Directory entries end with a trailing slash.
# Handlers receive only the change events whose paths match their own patterns.

path-index:
  - /app/**/*

group-index:
  - /app/L0/*/group.yaml
  - /app/L1/*/group.yaml
