    <title>Space Agent Login</title>

        --color-border-soft: rgba(148, 167, 201, 0.16);
        --color-border-strong: rgba(168, 186, 219, 0.28);
        --color-text-primary: #f3f7ff;
        --color-text-secondary: #b8c4da;
        --color-text-tertiary: #8e9bb2;
        --color-accent-primary: #7ddcff;
        --color-accent-primary-strong: #94bcff;
        --color-accent-primary-soft: rgba(125, 220, 255, 0.14);
        --color-accent-secondary: #79edd8;
        --color-accent-ink: #04101d;
        --color-status-success: #7ce4b0;
        --color-status-danger: #ff8d98;

        --color-backdrop-glow-depth: rgba(59, 95, 172, 0.26);
        --color-backdrop-star-strong: rgba(255, 255, 255, 0.76);
        --color-backdrop-star-soft: rgba(255, 255, 255, 0.26);
        --color-backdrop-star-accent: rgba(148, 188, 255, 0.48);
        --color-backdrop-star-halo: rgba(255, 255, 255, 0.12);
        --color-backdrop-star-halo-accent: rgba(148, 188, 255, 0.16);
        --radius-panel: 26px;
        --radius-control: 16px;
        --space-2: 0.5rem;
        --space-3: 0.875rem;
        --space-4: 1.25rem;
        --space-5: 1.75rem;
        --space-6: 2.5rem;
        --shadow-panel: 0 24px 64px rgba(0, 0, 0, 0.38);
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      html {
        min-height: 100%;
      }

      /* Mirrors /mod/_core/framework/visual.css for the public login shell. */
      body.space-theme-canvas {
        --space-parallax-bg-x: 0px;
        --space-parallax-bg-y: 0px;
        --space-parallax-glow-x: 0px;
        --space-parallax-glow-y: 0px;
        --space-parallax-stars-deep-x: 0px;
        --space-parallax-stars-deep-y: 0px;
        --space-parallax-stars-far-x: 0px;
        --space-parallax-stars-far-y: 0px;
        --space-parallax-stars-mid-x: 0px;
        --space-parallax-stars-mid-y: 0px;
        --space-parallax-stars-near-x: 0px;
        --space-parallax-stars-near-y: 0px;
        --space-parallax-stars-close-x: 0px;
        --space-parallax-stars-close-y: 0px;
        margin: 0;
        min-height: 100vh;
        display: grid;
        align-items: center;
        padding: clamp(0.875rem, 3vw, 2rem);
        overflow-x: hidden;
        position: relative;
        background:
          radial-gradient(
            circle at calc(50% + var(--space-parallax-glow-x)) calc(46% + var(--space-parallax-glow-y)),
            rgba(148, 188, 255, 0.14) 0%,
            transparent 28%
          ),
          radial-gradient(
            circle at calc(50% + var(--space-parallax-glow-x)) calc(56% + var(--space-parallax-glow-y)),
            rgba(121, 237, 216, 0.08) 0%,
            transparent 18%
          ),
          radial-gradient(
            circle at calc(18% + var(--space-parallax-bg-x)) calc(18% + var(--space-parallax-bg-y)),
            var(--color-backdrop-glow-primary) 0%,
            transparent 28%
          ),
          radial-gradient(
            circle at calc(82% + var(--space-parallax-bg-x)) calc(14% + var(--space-parallax-bg-y)),
            var(--color-backdrop-glow-secondary) 0%,
            transparent 23%
          ),
          radial-gradient(
            circle at calc(50% + var(--space-parallax-bg-x)) calc(120% + var(--space-parallax-bg-y)),
            var(--color-backdrop-glow-depth) 0%,
            transparent 38%
          ),
          linear-gradient(180deg, var(--color-canvas-elevated) 0%, var(--color-canvas) 52%, var(--color-canvas-deep) 100%);
        color: var(--color-text-primary);
      }

      body.space-theme-canvas::before,
      body.space-theme-canvas::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      body.space-theme-canvas::after {
        inset: auto;
        top: 16%;
        left: 10%;
        width: 10rem;
        height: 2px;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.03) 28%,
          rgba(148, 188, 255, 0.18) 56%,
          rgba(255, 255, 255, 0.96) 100%
        );
        transform-origin: right center;
        filter:
          drop-shadow(0 0 6px rgba(255, 255, 255, 0.5))
          drop-shadow(0 0 18px rgba(148, 188, 255, 0.22));
        opacity: 0;
        animation: space-theme-shooting-star 6s linear infinite;
      }

          inset: 0;

          --space-parallax-stars-deep-y: 0px;
          --space-parallax-stars-far-x: 0px;
          --space-parallax-stars-far-y: 0px;

          --space-parallax-stars-mid-y: 0px;

      .shell {

  <body class="space-theme-canvas">
    <main class="shell">
      <section class="intro" aria-label="Space Agent overview">
        <div class="intro-content">
          <h1>Space Agent</h1>
          <p class="intro-copy">
            AI agent that builds your space,<br />
            right in the browser.
          </p>
        </div>
        <div class="intro-art" aria-hidden="true">
          <img
            id="intro-astronaut"
            class="intro-astronaut"
            src="/pages/res/astronaut_no_bg.webp"
            alt=""
            decoding="async"
          />
        </div>
      </section>

      <section class="login-panel" aria-label="Login form">
        <h2>Sign in</h2>
        <form id="login-form">
          <label>
            <span>Username</span>
            <input id="username" name="username" type="text" autocomplete="username" required />
          </label>
          <label>
            <span>Password</span>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
          </label>
          <p id="field-note" class="field-note" hidden>
            Guest account ready, save your credentials!
          </p>
          <button id="submit-button" class="primary-button" type="submit">Enter your Space</button>
        </form>
        <div id="login-separator" class="login-separator">or</div>
        <button id="guest-create-button" class="secondary-button" type="button">
          Create Temporary Guest Account
        </button>
        <div id="status" class="status" role="status" aria-live="polite"></div>
      </section>
    </main>
    <script>
      const LOGIN_PREFIX = "space-login-v1";
      const CLIENT_KEY_LABEL = "Client Key";
      const SERVER_KEY_LABEL = "Server Key";
      const textEncoder = new TextEncoder();
      const form = document.getElementById("login-form");
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const fieldNote = document.getElementById("field-note");
      const loginSeparator = document.getElementById("login-separator");
      const submitButton = document.getElementById("submit-button");
      const guestCreateButton = document.getElementById("guest-create-button");
      const introAstronaut = document.getElementById("intro-astronaut");
      const statusEl = document.getElementById("status");
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
      let guestCredentials = null;
      let astronautFloatFrame = 0;
      let astronautFloatLastTime = 0;
      let astronautNextTargetAt = 0;
      let astronautCurrentX = 0;
      let astronautCurrentY = 0;
      let astronautCurrentRotation = 0;
      let astronautTargetX = 0;
      let astronautTargetY = 0;
      let astronautTargetRotation = 0;
      let parallaxTouchLocked = false;
      let parallaxFrame = 0;
      let parallaxTargetX = 0;
      let parallaxTargetY = 0;
      let parallaxCurrentX = 0;
      let parallaxCurrentY = 0;

      function setStatus(message, tone = "") {
        statusEl.textContent = message;
        statusEl.className = tone ? `status ${tone}` : "status";
      }

      function syncButtonState(isBusy = false) {
        submitButton.disabled = isBusy;
        guestCreateButton.disabled = isBusy;
      }

      function setAstronautPose(x, y, rotation) {
        if (!introAstronaut) {
          return;
        }

        introAstronaut.style.setProperty("--astronaut-float-x", `${x.toFixed(1)}px`);
        introAstronaut.style.setProperty("--astronaut-float-y", `${y.toFixed(1)}px`);
        introAstronaut.style.setProperty("--astronaut-rotate", `${rotation.toFixed(1)}deg`);
      }

      function chooseAstronautTarget(timestamp) {
        astronautTargetX = Math.random() * 28 - 14;
        astronautTargetY = Math.random() * 22 - 11;
        astronautTargetRotation = Math.random() * 30 - 15;
        astronautNextTargetAt = timestamp + 4200 + Math.random() * 2800;
      }

      function stepAstronautFloat(timestamp) {
        if (!introAstronaut) {
          astronautFloatFrame = 0;
          return;
        }

        if (prefersReducedMotion.matches) {
          astronautFloatFrame = 0;
          astronautFloatLastTime = 0;
          astronautNextTargetAt = 0;
          astronautCurrentX = 0;
          astronautCurrentY = 0;
          astronautCurrentRotation = 0;
          astronautTargetX = 0;
          astronautTargetY = 0;
          astronautTargetRotation = 0;
          setAstronautPose(0, 0, 0);
          return;
        }

        if (!astronautFloatLastTime) {
          astronautFloatLastTime = timestamp;
        }

        if (!astronautNextTargetAt || timestamp >= astronautNextTargetAt) {
          chooseAstronautTarget(timestamp);
        }

        const delta = Math.min(timestamp - astronautFloatLastTime, 40);
        astronautFloatLastTime = timestamp;

        const positionBlend = 1 - Math.exp(-delta / 1450);
        const rotationBlend = 1 - Math.exp(-delta / 3600);

        astronautCurrentX += (astronautTargetX - astronautCurrentX) * positionBlend;
        astronautCurrentY += (astronautTargetY - astronautCurrentY) * positionBlend;
        astronautCurrentRotation += (astronautTargetRotation - astronautCurrentRotation) * rotationBlend;

        setAstronautPose(astronautCurrentX, astronautCurrentY, astronautCurrentRotation);
        astronautFloatFrame = window.requestAnimationFrame(stepAstronautFloat);
      }

      function startAstronautFloat() {
        window.cancelAnimationFrame(astronautFloatFrame);
        astronautFloatFrame = 0;
        astronautFloatLastTime = 0;
        astronautNextTargetAt = 0;
        astronautCurrentX = 0;
        astronautCurrentY = 0;
        astronautCurrentRotation = 0;
        astronautTargetX = 0;
        astronautTargetY = 0;
        astronautTargetRotation = 0;
        setAstronautPose(0, 0, 0);

        if (!introAstronaut || prefersReducedMotion.matches) {
          return;
        }

        window.requestAnimationFrame(() => {
          astronautFloatFrame = window.requestAnimationFrame(stepAstronautFloat);
        });
      }

      function applyParallax(x, y) {
        document.body.style.setProperty("--space-parallax-bg-x", `${x * 4}px`);
        document.body.style.setProperty("--space-parallax-bg-y", `${y * 3}px`);
        document.body.style.setProperty("--space-parallax-glow-x", `${x * 7}px`);
        document.body.style.setProperty("--space-parallax-glow-y", `${y * 6}px`);
        document.body.style.setProperty("--space-parallax-stars-deep-x", `${x * 8}px`);
        document.body.style.setProperty("--space-parallax-stars-deep-y", `${y * 6}px`);
        document.body.style.setProperty("--space-parallax-stars-far-x", `${x * 10}px`);
        document.body.style.setProperty("--space-parallax-stars-far-y", `${y * 8}px`);
        document.body.style.setProperty("--space-parallax-stars-mid-x", `${x * 13}px`);
        document.body.style.setProperty("--space-parallax-stars-mid-y", `${y * 10}px`);
        document.body.style.setProperty("--space-parallax-stars-near-x", `${x * 16}px`);
        document.body.style.setProperty("--space-parallax-stars-near-y", `${y * 13}px`);
        document.body.style.setProperty("--space-parallax-stars-close-x", `${x * 20}px`);
        document.body.style.setProperty("--space-parallax-stars-close-y", `${y * 16}px`);
      }

      function scheduleParallax() {
        if (parallaxFrame || prefersReducedMotion.matches) {
          return;
        }

        parallaxFrame = window.requestAnimationFrame(() => {
          parallaxFrame = 0;
          parallaxCurrentX += (parallaxTargetX - parallaxCurrentX) * 0.12;
          parallaxCurrentY += (parallaxTargetY - parallaxCurrentY) * 0.12;
          applyParallax(parallaxCurrentX, parallaxCurrentY);

          if (
            Math.abs(parallaxTargetX - parallaxCurrentX) > 0.01 ||
            Math.abs(parallaxTargetY - parallaxCurrentY) > 0.01
          ) {
            scheduleParallax();
          }
        });
      }

      function setParallaxTarget(clientX, clientY) {
        if (prefersReducedMotion.matches || !window.innerWidth || !window.innerHeight) {
          return;
        }

        parallaxTargetX = (clientX / window.innerWidth - 0.5) * 2;
        parallaxTargetY = (clientY / window.innerHeight - 0.5) * 2;
        scheduleParallax();
      }

      function resetParallax(force = false) {
        if (!force && parallaxTouchLocked) {
          return;
        }

        parallaxTargetX = 0;
        parallaxTargetY = 0;
        scheduleParallax();
      }

      function setGuestCredentials(credentials) {
        guestCredentials =
          credentials && credentials.username && credentials.password
            ? {
                password: credentials.password,
                username: credentials.username
              }
            : null;

        const isGuestReady = Boolean(guestCredentials);

        if (isGuestReady) {
          usernameInput.value = guestCredentials.username;
          passwordInput.value = guestCredentials.password;
        }

        usernameInput.readOnly = isGuestReady;
        passwordInput.readOnly = isGuestReady;
        passwordInput.type = isGuestReady ? "text" : "password";
        submitButton.textContent = isGuestReady ? "Continue" : "Enter your Space";
        fieldNote.hidden = !isGuestReady;
        loginSeparator.hidden = isGuestReady;
        guestCreateButton.hidden = isGuestReady;
        syncButtonState(false);
      }

      function toBase64Url(bytes) {
        let text = "";
        bytes.forEach((value) => {
          text += String.fromCharCode(value);
        });
        return btoa(text).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
      }

      function fromBase64Url(value) {
        const normalized = String(value || "").replace(/-/g, "+").replace(/_/g, "/");
        const padding = normalized.length % 4 === 0 ? "" : "=".repeat(4 - (normalized.length % 4));
        const decoded = atob(normalized + padding);
        return Uint8Array.from(decoded, (char) => char.charCodeAt(0));
      }

      function xorBytes(left, right) {
        if (left.length !== right.length) {
          throw new Error("Mismatched proof length.");
        }

        const output = new Uint8Array(left.length);

        for (let index = 0; index < left.length; index += 1) {
          output[index] = left[index] ^ right[index];
        }

        return output;
      }

      async function sha256(value) {
        const source = typeof value === "string" ? textEncoder.encode(value) : value;
        return new Uint8Array(await crypto.subtle.digest("SHA-256", source));
      }

      async function hmacSha256(keyBytes, value) {
        const key = await crypto.subtle.importKey(
          "raw",
          keyBytes,
          {
            name: "HMAC",
            hash: "SHA-256"
          },
          false,
          ["sign"]
        );

        return new Uint8Array(await crypto.subtle.sign("HMAC", key, textEncoder.encode(value)));
      }

      async function deriveSaltedPassword(password, salt, iterations) {
        const passwordKey = await crypto.subtle.importKey(
          "raw",
          textEncoder.encode(password),
          "PBKDF2",
          false,
          ["deriveBits"]
        );

        const bits = await crypto.subtle.deriveBits(
          {
            name: "PBKDF2",
            hash: "SHA-256",
            iterations,
            salt: fromBase64Url(salt)
          },
          passwordKey,
          256
        );

        return new Uint8Array(bits);
      }

      async function postJson(path, body) {
        const response = await fetch(path, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(body)
        });

        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(payload.error || "Request failed.");
        }

        return payload;
      }

      function createNonce() {
        const bytes = new Uint8Array(24);
        crypto.getRandomValues(bytes);
        return toBase64Url(bytes);
      }

      async function handleLogin(event) {
        event.preventDefault();
        setStatus("Signing in...");
        syncButtonState(true);

        try {
          const username = usernameInput.value.trim();
          const password = passwordInput.value;

          if (!username || !password) {
            throw new Error("Username and password are required.");
          }

          const clientNonce = createNonce();
          const challenge = await postJson("/api/login_challenge", {
            clientNonce,
            username
          });
          const saltedPassword = await deriveSaltedPassword(
            password,
            challenge.salt,
            Number(challenge.iterations)
          );
          const clientKey = await hmacSha256(saltedPassword, CLIENT_KEY_LABEL);
          const storedKey = await sha256(clientKey);
          const authMessage = [
            LOGIN_PREFIX,
            username,
            clientNonce,
            challenge.serverNonce,
            challenge.challengeToken
          ].join(":");
          const clientSignature = await hmacSha256(storedKey, authMessage);
          const clientProof = xorBytes(clientKey, clientSignature);
          const loginResult = await postJson("/api/login", {
            challengeToken: challenge.challengeToken,
            clientProof: toBase64Url(clientProof)
          });
          const serverKey = await hmacSha256(saltedPassword, SERVER_KEY_LABEL);
          const expectedServerSignature = await hmacSha256(serverKey, authMessage);

          if (toBase64Url(expectedServerSignature) !== loginResult.serverSignature) {
            throw new Error("Server signature check failed.");
          }

          setStatus("Signed in. Redirecting...", "ok");
          window.location.replace("/");
        } catch (error) {
          setStatus(error.message || "Sign-in failed.", "error");
          syncButtonState(false);
          passwordInput.select();
        }
      }

      async function handleGuestCreate() {
        setStatus("Creating guest account...");
        syncButtonState(true);

        try {
          const guestAccount = await postJson("/api/guest_create", {});
          setGuestCredentials(guestAccount);
          setStatus("");
        } catch (error) {
          syncButtonState(false);
          setStatus(error.message || "Guest account creation failed.", "error");
        }
      }

      form.addEventListener("submit", handleLogin);
      guestCreateButton.addEventListener("click", handleGuestCreate);
      usernameInput.addEventListener("focus", () => {
        if (usernameInput.readOnly) {
          usernameInput.select();
        }
      });
      passwordInput.addEventListener("focus", () => {
        if (passwordInput.readOnly) {
          passwordInput.select();
        }
      });
      document.addEventListener(
        "pointermove",
        (event) => {
          if (event.pointerType && event.pointerType !== "mouse") {
            return;
          }

          parallaxTouchLocked = false;
          setParallaxTarget(event.clientX, event.clientY);
        },
        { passive: true }
      );
      document.addEventListener(
        "pointerdown",
        (event) => {
          parallaxTouchLocked = event.pointerType === "touch" || event.pointerType === "pen";
          setParallaxTarget(event.clientX, event.clientY);
        },
        { passive: true }
      );
      document.body.addEventListener("pointerleave", (event) => {
        if (event.pointerType && event.pointerType !== "mouse") {
          return;
        }

        resetParallax();
      });
      window.addEventListener("blur", () => {
        resetParallax(parallaxTouchLocked);
      });
      if (typeof prefersReducedMotion.addEventListener === "function") {
        prefersReducedMotion.addEventListener("change", () => {
          if (prefersReducedMotion.matches) {
            parallaxTouchLocked = false;
            applyParallax(0, 0);
          }

          startAstronautFloat();
        });
      } else if (typeof prefersReducedMotion.addListener === "function") {
        prefersReducedMotion.addListener(() => {
          if (prefersReducedMotion.matches) {
            parallaxTouchLocked = false;
            applyParallax(0, 0);
          }

          startAstronautFloat();
        });
      }
      syncButtonState(false);
      applyParallax(0, 0);
      if (introAstronaut && !introAstronaut.complete) {
        introAstronaut.addEventListener("load", startAstronautFloat, { once: true });
      } else {
        startAstronautFloat();
      }
    </script>
  </body>
