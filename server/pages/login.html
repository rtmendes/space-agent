<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Agent Login</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        background:
          radial-gradient(circle at top left, rgba(76, 133, 255, 0.18), transparent 38%),
          radial-gradient(circle at bottom right, rgba(56, 173, 120, 0.18), transparent 42%),
          linear-gradient(160deg, #edf3ff 0%, #f4f8ef 100%);
        color: #152135;
      }

      .login-card {
        width: min(28rem, 100%);
        padding: 1.6rem;
        border-radius: 1.2rem;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 20px 48px rgba(24, 39, 68, 0.14);
        backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0 0 0.35rem;
        font-size: 1.9rem;
      }

      p {
        margin: 0 0 1.25rem;
        line-height: 1.45;
        color: #49586d;
      }

      form {
        display: grid;
        gap: 0.85rem;
      }

      .login-separator {
        margin: 1.15rem 0 1rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: #69788c;
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .login-separator::before,
      .login-separator::after {
        content: "";
        flex: 1 1 auto;
        height: 1px;
        background: rgba(117, 136, 164, 0.28);
      }

      label {
        display: grid;
        gap: 0.35rem;
        font-size: 0.92rem;
        font-weight: 600;
      }

      input {
        width: 100%;
        border: 1px solid #c7d3e5;
        border-radius: 0.8rem;
        padding: 0.85rem 0.95rem;
        font: inherit;
        background: #fbfdff;
        color: inherit;
      }

      input:focus {
        outline: 2px solid rgba(66, 109, 214, 0.18);
        border-color: #4e74d8;
      }

      button {
        border: 0;
        border-radius: 0.9rem;
        padding: 0.9rem 1rem;
        font: inherit;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, #3258c5 0%, #3a8c6d 100%);
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.7;
        cursor: wait;
      }

      .secondary-button {
        width: 100%;
        color: #193354;
        background: linear-gradient(135deg, rgba(232, 238, 251, 0.98), rgba(218, 242, 233, 0.98));
        box-shadow: inset 0 0 0 1px rgba(100, 127, 171, 0.16);
      }

      .guest-card {
        margin-top: 0.95rem;
        padding: 0.95rem 1rem;
        border-radius: 0.95rem;
        background: rgba(237, 244, 255, 0.8);
        border: 1px solid rgba(110, 140, 196, 0.18);
      }

      .guest-card p {
        margin-bottom: 0.9rem;
      }

      .guest-actions {
        margin-top: 0.85rem;
      }

      .status {
        min-height: 1.3rem;
        margin-top: 0.9rem;
        font-size: 0.92rem;
      }

      .status.error {
        color: #b32424;
      }

      .status.ok {
        color: #1f7a49;
      }
    </style>
  </head>
  <body>
    <main class="login-card">
      <h1>Space Agent</h1>
      <p>Sign in to load your user-specific customware and modules.</p>
      <form id="login-form">
        <label>
          Username
          <input id="username" name="username" type="text" autocomplete="username" required />
        </label>
        <label>
          Password
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />
        </label>
        <button id="submit-button" type="submit">Sign In</button>
      </form>
      <div class="login-separator">or</div>
      <button id="guest-create-button" class="secondary-button" type="button">
        Create Temporary Guest Account
      </button>
      <section id="guest-card" class="guest-card" hidden>
        <p>Save these guest credentials. You can copy them now and continue directly.</p>
        <label>
          Guest Username
          <input id="guest-username" type="text" readonly />
        </label>
        <label>
          Guest Password
          <input id="guest-password" type="text" readonly />
        </label>
        <div class="guest-actions">
          <button id="guest-continue-button" type="button">Continue</button>
        </div>
      </section>
      <div id="status" class="status"></div>
    </main>
    <script>
      const LOGIN_PREFIX = "space-login-v1";
      const CLIENT_KEY_LABEL = "Client Key";
      const SERVER_KEY_LABEL = "Server Key";
      const textEncoder = new TextEncoder();
      const form = document.getElementById("login-form");
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const submitButton = document.getElementById("submit-button");
      const guestCreateButton = document.getElementById("guest-create-button");
      const guestCard = document.getElementById("guest-card");
      const guestUsernameInput = document.getElementById("guest-username");
      const guestPasswordInput = document.getElementById("guest-password");
      const guestContinueButton = document.getElementById("guest-continue-button");
      const statusEl = document.getElementById("status");
      let guestCredentials = null;

      function setStatus(message, tone = "") {
        statusEl.textContent = message;
        statusEl.className = tone ? `status ${tone}` : "status";
      }

      function syncButtonState(isBusy = false) {
        submitButton.disabled = isBusy;
        guestCreateButton.disabled = isBusy;
        guestContinueButton.disabled = isBusy || !guestCredentials;
      }

      function setGuestCredentials(credentials) {
        guestCredentials =
          credentials && credentials.username && credentials.password
            ? {
                password: credentials.password,
                username: credentials.username
              }
            : null;

        guestCard.hidden = !guestCredentials;
        guestUsernameInput.value = guestCredentials ? guestCredentials.username : "";
        guestPasswordInput.value = guestCredentials ? guestCredentials.password : "";
        syncButtonState(false);
      }

      function toBase64Url(bytes) {
        let text = "";
        bytes.forEach((value) => {
          text += String.fromCharCode(value);
        });
        return btoa(text).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
      }

      function fromBase64Url(value) {
        const normalized = String(value || "").replace(/-/g, "+").replace(/_/g, "/");
        const padding = normalized.length % 4 === 0 ? "" : "=".repeat(4 - (normalized.length % 4));
        const decoded = atob(normalized + padding);
        return Uint8Array.from(decoded, (char) => char.charCodeAt(0));
      }

      function xorBytes(left, right) {
        if (left.length !== right.length) {
          throw new Error("Mismatched proof length.");
        }

        const output = new Uint8Array(left.length);

        for (let index = 0; index < left.length; index += 1) {
          output[index] = left[index] ^ right[index];
        }

        return output;
      }

      async function sha256(value) {
        const source = typeof value === "string" ? textEncoder.encode(value) : value;
        return new Uint8Array(await crypto.subtle.digest("SHA-256", source));
      }

      async function hmacSha256(keyBytes, value) {
        const key = await crypto.subtle.importKey(
          "raw",
          keyBytes,
          {
            name: "HMAC",
            hash: "SHA-256"
          },
          false,
          ["sign"]
        );

        return new Uint8Array(await crypto.subtle.sign("HMAC", key, textEncoder.encode(value)));
      }

      async function deriveSaltedPassword(password, salt, iterations) {
        const passwordKey = await crypto.subtle.importKey(
          "raw",
          textEncoder.encode(password),
          "PBKDF2",
          false,
          ["deriveBits"]
        );

        const bits = await crypto.subtle.deriveBits(
          {
            name: "PBKDF2",
            hash: "SHA-256",
            iterations,
            salt: fromBase64Url(salt)
          },
          passwordKey,
          256
        );

        return new Uint8Array(bits);
      }

      async function postJson(path, body) {
        const response = await fetch(path, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(body)
        });

        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(payload.error || "Request failed.");
        }

        return payload;
      }

      function createNonce() {
        const bytes = new Uint8Array(24);
        crypto.getRandomValues(bytes);
        return toBase64Url(bytes);
      }

      async function handleLogin(event) {
        event.preventDefault();
        setStatus("Signing in...");
        syncButtonState(true);

        try {
          const username = usernameInput.value.trim();
          const password = passwordInput.value;

          if (!username || !password) {
            throw new Error("Username and password are required.");
          }

          const clientNonce = createNonce();
          const challenge = await postJson("/api/login_challenge", {
            clientNonce,
            username
          });
          const saltedPassword = await deriveSaltedPassword(
            password,
            challenge.salt,
            Number(challenge.iterations)
          );
          const clientKey = await hmacSha256(saltedPassword, CLIENT_KEY_LABEL);
          const storedKey = await sha256(clientKey);
          const authMessage = [
            LOGIN_PREFIX,
            username,
            clientNonce,
            challenge.serverNonce,
            challenge.challengeToken
          ].join(":");
          const clientSignature = await hmacSha256(storedKey, authMessage);
          const clientProof = xorBytes(clientKey, clientSignature);
          const loginResult = await postJson("/api/login", {
            challengeToken: challenge.challengeToken,
            clientProof: toBase64Url(clientProof)
          });
          const serverKey = await hmacSha256(saltedPassword, SERVER_KEY_LABEL);
          const expectedServerSignature = await hmacSha256(serverKey, authMessage);

          if (toBase64Url(expectedServerSignature) !== loginResult.serverSignature) {
            throw new Error("Server signature check failed.");
          }

          setStatus("Signed in. Redirecting...", "ok");
          window.location.replace("/");
        } catch (error) {
          setStatus(error.message || "Sign-in failed.", "error");
          syncButtonState(false);
          passwordInput.select();
        }
      }

      async function handleGuestCreate() {
        setStatus("Creating guest account...");
        syncButtonState(true);

        try {
          const guestAccount = await postJson("/api/guest_create", {});
          setGuestCredentials(guestAccount);
          usernameInput.value = guestAccount.username;
          passwordInput.value = guestAccount.password;
          setStatus("Guest account created. Copy the credentials, then continue.", "ok");
        } catch (error) {
          syncButtonState(false);
          setStatus(error.message || "Guest account creation failed.", "error");
        }
      }

      function handleGuestContinue() {
        if (!guestCredentials) {
          return;
        }

        usernameInput.value = guestCredentials.username;
        passwordInput.value = guestCredentials.password;

        if (typeof form.requestSubmit === "function") {
          form.requestSubmit(submitButton);
          return;
        }

        submitButton.click();
      }

      form.addEventListener("submit", handleLogin);
      guestCreateButton.addEventListener("click", handleGuestCreate);
      guestContinueButton.addEventListener("click", handleGuestContinue);
      syncButtonState(false);
    </script>
  </body>
</html>
