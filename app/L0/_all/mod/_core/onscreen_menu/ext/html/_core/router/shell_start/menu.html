<link rel="stylesheet" href="/mod/_core/onscreen_menu/onscreen-menu.css" />

<div
  x-data="{
    isOpen: false,
    singleUserApp: Boolean(window.space?.config?.get('SINGLE_USER_APP', false)),
    enterTabAccessKey: 'space.enter.tab-access',
    isEmbeddedInsideAdmin() {
      if (window.top === window) {
        return false;
      }

      try {
        return window.top.location.pathname === '/admin';
      } catch {
        return false;
      }
    },
    navigateCurrent(targetUrl, mode = 'assign') {
      window.location[mode](targetUrl);
    },
    navigateTop(targetUrl, mode = 'assign') {
      try {
        window.top.location[mode](targetUrl);
      } catch {
        this.navigateCurrent(targetUrl, mode);
      }
    },
    openAdmin() {
      const currentUrl = `${window.location.pathname}${window.location.search}${window.location.hash}` || '/index.html';
      const adminUrl = new URL('/admin', window.location.href);
      adminUrl.searchParams.set('url', currentUrl);
      this.isOpen = false;
      this.navigateTop(adminUrl.href);
    },
    openRoute(routeHash) {
      const routeUrl = new URL(window.location.pathname + window.location.search, window.location.origin);
      routeUrl.hash = routeHash;
      this.isOpen = false;

      if (this.isEmbeddedInsideAdmin()) {
        this.navigateCurrent(routeUrl.href);
        return;
      }

      this.navigateTop(routeUrl.href);
    },
    openDashboard() {
      this.openRoute('/dashboard');
    },
    openAgent() {
      this.openRoute('/agent');
    },
    openLeave() {
      this.isOpen = false;
      try {
        window.sessionStorage.removeItem(this.enterTabAccessKey);
      } catch {}
      this.navigateTop('/enter', 'replace');
    }
  }"
  class="onscreen-menu"
  @click.outside="isOpen = false"
  @keydown.escape.window="isOpen = false"
>
  <div class="space-topbar-menu">
    <div class="space-topbar onscreen-menu-shell">
      <button
        type="button"
        class="space-topbar-button space-topbar-button--icon"
        :class="{ 'is-active': isOpen }"
        aria-label="Open page menu"
        aria-haspopup="menu"
        aria-controls="onscreen-menu-panel"
        :aria-expanded="String(isOpen)"
        @click="isOpen = !isOpen"
      >
        <x-icon>menu</x-icon>
      </button>
    </div>

    <div
      id="onscreen-menu-panel"
      class="space-topbar-menu-panel onscreen-menu-panel"
      x-cloak
      x-show="isOpen"
      x-transition.opacity.scale.origin.top.right.duration.140ms
      role="menu"
      aria-label="Page menu"
    >
      <button
        type="button"
        class="space-topbar-menu-action"
        role="menuitem"
        @click="openDashboard()"
      >
        <x-icon>space_dashboard</x-icon>
        <span class="space-topbar-menu-action-label">Dashboard</span>
      </button>
      <button
        type="button"
        class="space-topbar-menu-action"
        role="menuitem"
        @click="openAgent()"
      >
        <x-icon>smart_toy</x-icon>
        <span class="space-topbar-menu-action-label">Agent</span>
      </button>
      <button
        type="button"
        class="space-topbar-menu-action"
        role="menuitem"
        @click="openAdmin()"
      >
        <x-icon>admin_panel_settings</x-icon>
        <span class="space-topbar-menu-action-label">Admin</span>
      </button>
      <button
        type="button"
        class="space-topbar-menu-action"
        role="menuitem"
        x-show="!singleUserApp"
        @click="isOpen = false; try { window.top.location.assign('/logout') } catch(e) { window.location.assign('/logout') }"
      >
        <x-icon>logout</x-icon>
        <span class="space-topbar-menu-action-label">Logout</span>
      </button>
      <button
        type="button"
        class="space-topbar-menu-action"
        role="menuitem"
        x-show="singleUserApp"
        @click="openLeave()"
      >
        <x-icon>exit_to_app</x-icon>
        <span class="space-topbar-menu-action-label">Leave</span>
      </button>
    </div>
  </div>
</div>
